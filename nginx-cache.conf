# Cache-Control für statische Assets – in den server {} Block einfügen
# Bilder: 1 Jahr (unveränderlich nach Deployment)
location ~* \.(webp|jpg|jpeg|png|gif|ico|svg)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
}

# CSS & JS: 1 Woche (mit Versionierung empfohlen)
location ~* \.(css|js)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
}

# Fonts
location ~* \.(woff2|woff|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
}

# HTML: nicht cachen (damit Updates sofort sichtbar sind)
location ~* \.html$ {
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
}
